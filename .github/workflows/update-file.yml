name: Run updateFile.js dynamically

on:
  schedule:
    - cron: '0 0 * * *'  # Once per day at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run updateFile.js 0-3 times with 1 minute delay
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUM_RUNS=$((RANDOM % 4))
          echo "Will run $NUM_RUNS times today"
          for ((i=1; i<=NUM_RUNS; i++)); do
            echo "Run #$i"
            node updateFile.js
            git config --global user.name 'zfareed'
            git config --global user.email 'zainfareed093@gmail.com'
            git add data.txt
            git commit -m "🕘 Auto-update data.txt @ $(date -u +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
            git push origin HEAD:main
            if [ $i -lt $NUM_RUNS ]; then
              echo "Waiting 1 minute before next run..."
              sleep 60  # 1 minute
            fi
          done
