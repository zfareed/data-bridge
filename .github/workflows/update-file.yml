name: Run updateFile.js daily

on:
  schedule:
    - cron: '0 16 * * *'  # 9:00 PM PKT (16:00 UTC)
  workflow_dispatch:       # allows manual trigger too

permissions:
  contents: write  # Grants write permissions for pushing changes

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run updateFile.js
        run: node updateFile.js

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.txt
          git commit -m "🕘 Auto-update data.txt @ $(date -u +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin HEAD:main
